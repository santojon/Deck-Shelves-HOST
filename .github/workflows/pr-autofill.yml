name: PR Autofill

# Fills the PR body's Changelog / Release Notes sections from the PR branch's
# `## [Unreleased]` entries in CHANGELOG.md and RELEASE_NOTES.md.
# Also auto-checks the Type-of-Change row that matches the PR title tag.
#
# Uses `pull_request_target` so the token has `pull-requests: write` even on
# PRs opened from forks. The workflow only READS text files from the PR head
# (never runs code from it) and edits the PR body via the GitHub API — no
# untrusted input is ever passed to a shell.
#
# NOTE: pull_request_target always runs the workflow version on the DEFAULT
# branch, so autofill only takes effect for PRs opened after this file is on
# `main`.
on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: write

jobs:
  autofill:
    runs-on: ubuntu-latest
    steps:
      - name: Autofill PR body from Unreleased sections
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPO: ${{ github.repository }}
        run: |
          python3 <<'PY'
          import os, re, subprocess, sys, base64

          def fetch_file(repo, path, sha):
              try:
                  result = subprocess.check_output(
                      ['gh', 'api', f'repos/{repo}/contents/{path}?ref={sha}',
                       '--jq', '.content'],
                      text=True, stderr=subprocess.DEVNULL,
                  )
                  return base64.b64decode(result.replace('\n', '')).decode('utf-8')
              except subprocess.CalledProcessError:
                  return ''

          def extract_unreleased(text: str) -> str:
              m = re.search(
                  r'^## \[Unreleased\][^\n]*\n(.*?)(?=^## \[|\Z)',
                  text, re.MULTILINE | re.DOTALL,
              )
              return m.group(1).strip() if m else ''

          def replace_between(body: str, key: str, content: str) -> str:
              if not content:
                  return body
              start = f'<!-- AUTOFILL:{key}:START -->'
              end   = f'<!-- AUTOFILL:{key}:END -->'
              if start not in body or end not in body:
                  return body
              replacement = f'{start}\n{content}\n{end}'
              return re.sub(
                  re.escape(start) + r'.*?' + re.escape(end),
                  lambda _m: replacement,
                  body, count=1, flags=re.DOTALL,
              )

          # Description is the author's own narrative — don't autofill.
          # Changelog comes from CHANGELOG.md (technical detail) and Release
          # Notes from RELEASE_NOTES.md (user-facing).
          pr_head_repo = os.environ['PR_HEAD_REPO']
          pr_head_sha  = os.environ['PR_HEAD_SHA']

          notes = extract_unreleased(fetch_file(pr_head_repo, 'RELEASE_NOTES.md', pr_head_sha))
          chg   = extract_unreleased(fetch_file(pr_head_repo, 'CHANGELOG.md',     pr_head_sha))

          pr_number = os.environ['PR_NUMBER']
          repo      = os.environ['REPO']

          import json

          pr_json = subprocess.check_output(
              ['gh', 'pr', 'view', pr_number, '--repo', repo,
               '--json', 'body,title', '--jq', '[.body, .title]'],
              text=True,
          )
          body, title = json.loads(pr_json)

          new_body = replace_between(body, 'CHANGELOG',     chg)
          new_body = replace_between(new_body, 'RELEASE_NOTES', notes)

          # Auto-check the Type-of-Change row matching the PR title tag.
          TAG_TO_TYPE_ROW = {
              'FIX':         'Bug fix / Enhancement / QA / Performance',
              'ENHANCEMENT': 'Bug fix / Enhancement / QA / Performance',
              'PERF':        'Bug fix / Enhancement / QA / Performance',
              'QA':          'Bug fix / Enhancement / QA / Performance',
              'FEATURE':     'New feature / Code cleanup',
              'CLEANUP':     'New feature / Code cleanup',
              'REFACTOR':    'Refactor / breaking change',
          }
          m = re.match(r'^\[([A-Z]+)\]', (title or '').strip())
          if m:
              row = TAG_TO_TYPE_ROW.get(m.group(1))
              if row:
                  new_body = re.sub(
                      r'^(\s*-\s*)\[ \](\s+' + re.escape(row) + r')',
                      r'\1[x]\2',
                      new_body, count=1, flags=re.MULTILINE,
                  )

          if new_body == body:
              print('No autofill changes (markers missing, Unreleased empty, or already synced).')
              sys.exit(0)

          subprocess.run(
              ['gh', 'pr', 'edit', pr_number, '--repo', repo, '--body-file', '-'],
              input=new_body, text=True, check=True,
          )
          print('PR body autofilled from Unreleased sections.')
          PY
